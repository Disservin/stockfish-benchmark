name: Comment Benchmark

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read
  id-token: "write"

concurrency:
  group: comment-benchmark-${{ github.event.comment.id }}
  cancel-in-progress: false

jobs:
  benchmark:
    if: github.event.issue.number == 1 && startsWith(github.event.comment.body, '/benchmark ')
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check benchmark allowlist
        env:
          ACTOR: ${{ github.event.comment.user.login }}
          ALLOWED_USERS: ${{ vars.BENCHMARK_ALLOWED_USERS }}
        run: |
          if [ -z "$ALLOWED_USERS" ]; then
            echo "BENCHMARK_ALLOWED_USERS is empty; refusing to trigger benchmark"
            exit 1
          fi

          if ! printf '%s' "$ALLOWED_USERS" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | grep -Fx "$ACTOR"; then
            echo "@$ACTOR is not allowed to trigger benchmarks"
            exit 1
          fi

      - name: Parse benchmark command
        id: command
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import re
          import sys

          body = os.environ["COMMENT_BODY"].strip()
          parts = body.split()
          if len(parts) != 2 or parts[0] != "/benchmark":
              print("Expected exactly: /benchmark https://github.com/OWNER/REPO/pull/NUMBER", file=sys.stderr)
              raise SystemExit(1)

          match = re.fullmatch(r"https://github\.com/([^/]+)/([^/]+)/pull/([0-9]+)", parts[1])
          if not match:
              print("Benchmark URL must look like: https://github.com/OWNER/REPO/pull/NUMBER", file=sys.stderr)
              raise SystemExit(1)

          owner, repo, pr = match.groups()
          print(f"target_repo={owner}/{repo}")
          print(f"target_repo_url=https://github.com/{owner}/{repo}.git")
          print(f"target_pr={pr}")
          PY

      - name: Checkout benchmark repo
        uses: actions/checkout@v7

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Install gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Run GCP benchmark
        id: bench
        env:
          TARGET_REPO_URL: ${{ steps.command.outputs.target_repo_url }}
          TARGET_PR: ${{ steps.command.outputs.target_pr }}
          BENCH_ARCH: ${{ vars.BENCH_ARCH || 'x86-64-avx512icl' }}
          BENCH_RUNS: ${{ vars.BENCH_RUNS || '20' }}
          BENCH_SPEEDTEST_ARGS: ${{ vars.BENCH_SPEEDTEST_ARGS || '1 16 5' }}
          GCP_ZONE: ${{ vars.GCP_ZONE || 'us-central1-a' }}
          GCP_MACHINE_TYPE: ${{ vars.GCP_MACHINE_TYPE || 'n2-custom-2-2048' }}
          GCP_MIN_CPU_PLATFORM: ${{ vars.GCP_MIN_CPU_PLATFORM || 'Intel Ice Lake' }}
        run: |
          cat > filter-benchmark-log.py <<'PY'
          import sys

          show = False
          benchmark_prefixes = (
              "$ git ",
              "$ make ",
              "speedtest run ",
              "Position ",
              "===========================",
              "Version ",
              "Summary",
          )

          for line in sys.stdin:
              if not show and line.startswith(benchmark_prefixes):
                  show = True
              if show:
                  print(line, end="", flush=True)
          PY

          set +e
          ./gcp_spot_benchmark.py ignored \
            --repo "$TARGET_REPO_URL" \
            --test-pr "$TARGET_PR" \
            --arch "$BENCH_ARCH" \
            --runs "$BENCH_RUNS" \
            --speedtest-args "$BENCH_SPEEDTEST_ARGS" \
            --zone "$GCP_ZONE" \
            --machine-type "$GCP_MACHINE_TYPE" \
            --min-cpu-platform "$GCP_MIN_CPU_PLATFORM" \
            2>&1 | tee benchmark-output.txt | python3 filter-benchmark-log.py
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Comment benchmark result
        if: always()
        env:
          GH_TOKEN: ${{ secrets.STOCKFISH_COMMENT_TOKEN }}
          TARGET_REPO: ${{ steps.command.outputs.target_repo }}
          TARGET_PR: ${{ steps.command.outputs.target_pr }}
          STATUS: ${{ steps.bench.outputs.status }}
          ACTOR: ${{ github.event.comment.user.login }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          status = os.environ.get("STATUS")
          actor = os.environ.get("ACTOR", "unknown")
          run_url = os.environ["RUN_URL"]
          output_path = Path("benchmark-output.txt")
          fields = [
              "Compiled by",
              "Compilation architecture",
              "Compilation settings",
              "Compiler __VERSION__ macro",
              "Large pages",
              "Filled invocation",
              "Available processors",
              "Thread count",
              "TT size [MiB]",
          ]

          def table_escape(value: str) -> str:
              return value.replace("|", "\\|")

          lines = output_path.read_text(errors="replace").splitlines() if output_path.exists() else []
          field_values = {}
          for line in lines:
              for field in fields:
                  prefix = f"{field}"
                  if line.startswith(prefix) and ":" in line:
                      field_values[field] = line.split(":", 1)[1].strip()

          summary = []
          for index in range(len(lines) - 1, -1, -1):
              if lines[index] == "Summary":
                  for line in lines[index:]:
                      summary.append(line)
                      if line.startswith("P(speedup > 0):"):
                          break
                  break

          with open("comment.md", "w", encoding="utf-8") as comment:
              if status == "0":
                  print("Stockfish speedtest benchmark finished.", file=comment)
              else:
                  print("Stockfish speedtest benchmark failed.", file=comment)
              print(f"Benchmark run at the request of @{actor}. Baseline: official Stockfish master.", file=comment)
              print(file=comment)

              if status != "0":
                  print(f"See the [GitHub Actions run]({run_url}) for details.", file=comment)
                  raise SystemExit(0)

              if field_values:
                  print("### Run Details", file=comment)
                  print("| Field | Value |", file=comment)
                  print("| --- | --- |", file=comment)
                  for field in fields:
                      if field in field_values:
                          print(f"| {field} | {table_escape(field_values[field])} |", file=comment)
                  print(file=comment)

              if summary:
                  print("### Result", file=comment)
                  print("```text", file=comment)
                  print("\n".join(summary), file=comment)
                  print("```", file=comment)
              elif lines:
                  print("### Raw Output Excerpt", file=comment)
                  print("```text", file=comment)
                  print("\n".join(lines[-160:]), file=comment)
                  print("```", file=comment)
              else:
                  print("benchmark-output.txt was not produced", file=comment)
          PY

          gh pr comment "$TARGET_PR" \
            --repo "$TARGET_REPO" \
            --body-file comment.md

      - name: Fail workflow if benchmark failed
        if: steps.bench.outputs.status != '0'
        run: exit 1
