name: Comment Benchmark

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read
  id-token: "write"

concurrency:
  group: comment-benchmark-${{ github.event.comment.id }}
  cancel-in-progress: false

jobs:
  benchmark:
    if: github.event.issue.number == 1 && startsWith(github.event.comment.body, '/benchmark ')
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check benchmark allowlist
        env:
          ACTOR: ${{ github.event.comment.user.login }}
          ALLOWED_USERS: ${{ vars.BENCHMARK_ALLOWED_USERS }}
        run: |
          if [ -z "$ALLOWED_USERS" ]; then
            echo "BENCHMARK_ALLOWED_USERS is empty; refusing to trigger benchmark"
            exit 1
          fi

          allowed=false

          IFS=',' read -ra users <<< "$ALLOWED_USERS"

          for user in "${users[@]}"; do
              # Trim leading and trailing whitespace
              user="${user#"${user%%[![:space:]]*}"}"
              user="${user%"${user##*[![:space:]]}"}"

              if [[ "$user" == "$ACTOR" ]]; then
                  allowed=true
                  break
              fi
          done

          if [[ "$allowed" != true ]]; then
              echo "@$ACTOR is not allowed to trigger benchmarks"
              exit 1
          fi

      - name: Parse benchmark command
        id: command
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import argparse
          import os
          import re
          import shlex
          import sys

          body = os.environ["COMMENT_BODY"].strip()
          try:
              parts = shlex.split(body)
          except ValueError as exc:
              print(f"Could not parse /benchmark command: {exc}", file=sys.stderr)
              raise SystemExit(1)

          if not parts or parts[0] != "/benchmark":
              print("Expected: /benchmark https://github.com/OWNER/REPO/pull/NUMBER [--arch ARCH] [--runs RUNS] [--speedtest-args ARGS...]", file=sys.stderr)
              raise SystemExit(1)

          def positive_int(value):
              parsed = int(value)
              if parsed < 1:
                  raise argparse.ArgumentTypeError("must be at least 1")
              return parsed

          parser = argparse.ArgumentParser(prog="/benchmark")
          parser.add_argument("pull_url")
          parser.add_argument("--arch")
          parser.add_argument("--runs", type=positive_int)
          parser.add_argument(
              "--speedtest-args",
              nargs="+",
              help="Arguments after Stockfish speedtest. Put this option last unless the value is quoted.",
          )
          try:
              command = parser.parse_args(parts[1:])
          except SystemExit:
              print("Expected: /benchmark https://github.com/OWNER/REPO/pull/NUMBER [--arch ARCH] [--runs RUNS] [--speedtest-args ARGS...]", file=sys.stderr)
              raise

          match = re.fullmatch(r"https://github\.com/([^/]+)/([^/]+)/pull/([0-9]+)", command.pull_url)
          if not match:
              print("Benchmark URL must look like: https://github.com/OWNER/REPO/pull/NUMBER", file=sys.stderr)
              raise SystemExit(1)

          owner, repo, pr = match.groups()
          print(f"target_repo={owner}/{repo}")
          print(f"target_repo_url=https://github.com/{owner}/{repo}.git")
          print(f"target_pr={pr}")
          if command.arch:
              print(f"benchmark_arch={command.arch}")
          if command.runs:
              print(f"benchmark_runs={command.runs}")
          if command.speedtest_args:
              speedtest_args = command.speedtest_args[0] if len(command.speedtest_args) == 1 else shlex.join(command.speedtest_args)
              print(f"benchmark_speedtest_args={speedtest_args}")
          PY

      - name: Checkout benchmark repo
        uses: actions/checkout@v7

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Install gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Run GCP benchmark
        id: bench
        env:
          TARGET_REPO_URL: ${{ steps.command.outputs.target_repo_url }}
          TARGET_PR: ${{ steps.command.outputs.target_pr }}
          BENCH_ARCH: ${{ steps.command.outputs.benchmark_arch || vars.BENCH_ARCH || 'x86-64-avx512icl' }}
          BENCH_RUNS: ${{ steps.command.outputs.benchmark_runs || vars.BENCH_RUNS || '40' }}
          BENCH_SPEEDTEST_ARGS: ${{ steps.command.outputs.benchmark_speedtest_args || vars.BENCH_SPEEDTEST_ARGS || '1 16 5' }}
          GCP_ZONE: ${{ vars.GCP_ZONE || 'us-central1-a' }}
          GCP_MACHINE_TYPE: ${{ vars.GCP_MACHINE_TYPE || 'c4-highcpu-2' }}
          GCP_MIN_CPU_PLATFORM: ${{ vars.GCP_MIN_CPU_PLATFORM || 'Intel Emerald Rapids' }}
        run: |
          cat > filter-benchmark-log.py <<'PY'
          import os
          import re
          import sys

          sensitive_values = [
              os.environ.get("GCP_ZONE"),
          ]
          sensitive_values = [value for value in sensitive_values if value]

          def redact(line):
              for value in sensitive_values:
                  line = line.replace(value, "<redacted>")
              line = re.sub(r"\b[\w.+-]+@[\w.-]+\.iam\.gserviceaccount\.com\b", "<redacted-service-account>", line)
              line = re.sub(r"\bprojects/[^/\s]+", "projects/<redacted-project>", line)
              line = re.sub(r"(?i)(project(?:s|[_ -]?id)?[=:\s'\"]+)[a-z][a-z0-9-]{4,28}[a-z0-9]", r"\1<redacted-project>", line)
              line = re.sub(r"\bbenchmark-[a-z0-9-]+-[0-9a-f]{8}\b", "<redacted-instance>", line)
              return line

          show = False
          benchmark_prefixes = (
              "$ git ",
              "$ make ",
              "speedtest run ",
              "Position ",
              "===========================",
              "Version ",
              "Summary",
          )
          error_markers = (
              "ERROR:",
              "Error:",
              "error:",
              "Exception",
              "Traceback ",
              "CalledProcessError",
              "failed",
              "Failed",
              "not found",
              "No such file",
              "permission denied",
              "Permission denied",
              "GCP instance",
              "preempted",
          )

          for line in sys.stdin:
              if not show and line.startswith(benchmark_prefixes):
                  show = True
              if show or any(marker in line for marker in error_markers):
                  print(redact(line), end="", flush=True)
          PY

          set +e
          ./gcp_spot_benchmark.py ignored \
            --repo "$TARGET_REPO_URL" \
            --test-pr "$TARGET_PR" \
            --arch "$BENCH_ARCH" \
            --runs "$BENCH_RUNS" \
            --speedtest-args "$BENCH_SPEEDTEST_ARGS" \
            --zone "$GCP_ZONE" \
            --machine-type "$GCP_MACHINE_TYPE" \
            --min-cpu-platform "$GCP_MIN_CPU_PLATFORM" \
            2>&1 | tee benchmark-output.txt | python3 filter-benchmark-log.py
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Comment benchmark result
        if: always()
        env:
          GH_TOKEN: ${{ secrets.STOCKFISH_COMMENT_TOKEN }}
          TARGET_REPO: ${{ steps.command.outputs.target_repo }}
          TARGET_PR: ${{ steps.command.outputs.target_pr }}
          STATUS: ${{ steps.bench.outputs.status }}
          ACTOR: ${{ github.event.comment.user.login }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GCP_ZONE: ${{ vars.GCP_ZONE || 'us-central1-a' }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          status = os.environ.get("STATUS")
          actor = os.environ.get("ACTOR", "unknown")
          run_url = os.environ["RUN_URL"]
          output_path = Path("benchmark-output.txt")
          fields = [
              "Compiled by",
              "Compilation architecture",
              "Compilation settings",
              "Large pages",
              "Filled invocation",
              "Thread count",
              "TT size [MiB]",
          ]

          def table_escape(value: str) -> str:
              return value.replace("|", "\\|")

          def short_commit(value: str) -> str:
              return value[:8] if value else "unknown"

          def format_int(value: str) -> str:
              try:
                  return f"{int(round(float(value))):,}"
              except ValueError:
                  return value

          def format_signed_int(value: str) -> str:
              try:
                  parsed = int(round(float(value)))
              except ValueError:
                  return value
              return f"{parsed:+,}"

          def format_percent(value: str, digits: int = 3) -> str:
              try:
                  parsed = float(value)
              except ValueError:
                  return value
              return f"{parsed:+.{digits}f}%"

          def format_probability(value: str) -> str:
              try:
                  return f"{float(value) * 100.0:.1f}%"
              except ValueError:
                  return value

          sensitive_values = [
              os.environ.get("GCP_ZONE"),
          ]
          sensitive_values = [value for value in sensitive_values if value]

          def redact(line: str) -> str:
              for value in sensitive_values:
                  line = line.replace(value, "<redacted>")
              line = re.sub(r"\b[\w.+-]+@[\w.-]+\.iam\.gserviceaccount\.com\b", "<redacted-service-account>", line)
              line = re.sub(r"\bprojects/[^/\s]+", "projects/<redacted-project>", line)
              line = re.sub(r"(?i)(project(?:s|[_ -]?id)?[=:\s'\"]+)[a-z][a-z0-9-]{4,28}[a-z0-9]", r"\1<redacted-project>", line)
              line = re.sub(r"\bbenchmark-[a-z0-9-]+-[0-9a-f]{8}\b", "<redacted-instance>", line)
              return line

          def failure_excerpt(lines: list[str]) -> list[str]:
              markers = (
                  "ERROR:",
                  "Error:",
                  "error:",
                  "Exception",
                  "Traceback ",
                  "CalledProcessError",
                  "failed",
                  "Failed",
                  "not found",
                  "No such file",
                  "permission denied",
                  "Permission denied",
                  "GCP instance",
                  "preempted",
              )
              for index, line in enumerate(lines):
                  if any(marker in line for marker in markers):
                      start = max(0, index - 8)
                      end = min(len(lines), index + 32)
                      return [redact(line) for line in lines[start:end]]
              return [redact(line) for line in lines[-80:]]

          lines = output_path.read_text(errors="replace").splitlines() if output_path.exists() else []
          field_values = {}
          for line in lines:
              for field in fields:
                  prefix = f"{field}"
                  if line.startswith(prefix) and ":" in line:
                      field_values[field] = line.split(":", 1)[1].strip()

          summary = []
          for index in range(len(lines) - 1, -1, -1):
              if lines[index] == "Summary":
                  for line in lines[index:]:
                      summary.append(line)
                      if line.startswith("P(speedup > 0):"):
                          break
                  break

          benchmark_report = None
          for line in lines:
              if not line.startswith("BENCHMARK_RESULT_JSON "):
                  continue
              try:
                  benchmark_report = json.loads(line.split(" ", 1)[1])
              except json.JSONDecodeError:
                  benchmark_report = None

          has_compact_summary = isinstance(benchmark_report, dict) and all(
              key in benchmark_report
              for key in (
                  "base",
                  "test",
                  "diff_nps",
                  "diff_ci95_nps",
                  "speedup_percent",
                  "speedup_ci95_percent",
                  "probability_speedup",
              )
          )

          with open("comment.md", "w", encoding="utf-8") as comment:
              if status == "0":
                  print(f"Stockfish speedtest finished for @{actor} against official master.", file=comment)
              else:
                  print("Stockfish speedtest benchmark failed.", file=comment)
                  print(f"Benchmark run at the request of @{actor}. Baseline: official Stockfish master.", file=comment)
              print(file=comment)

              if status != "0":
                  print("### Error", file=comment)
                  if lines:
                      print("```text", file=comment)
                      print("\n".join(failure_excerpt(lines)), file=comment)
                      print("```", file=comment)
                  else:
                      print("benchmark-output.txt was not produced", file=comment)
                  print(f"See the [GitHub Actions run]({run_url}) for full logs.", file=comment)
                  raise SystemExit(0)

              if has_compact_summary:
                  run_details = []
                  for field in ("Filled invocation", "Compilation architecture", "Compiled by", "Large pages"):
                      if field not in field_values:
                          continue
                      value = field_values[field]
                      if field == "Compiled by":
                          compiler_match = re.match(r"([^\s]+)\s+.*?([0-9]+(?:\.[0-9]+)+)", value)
                          value = f"{compiler_match.group(1)} {compiler_match.group(2)}" if compiler_match else value
                      elif field == "Large pages":
                          value = f"large pages: {value}"
                      run_details.append(f"`{value}`" if field != "Large pages" else value)

                  if run_details:
                      print(" | ".join(run_details), file=comment)
                      print(file=comment)

                  print("| | Ref | Runs | NPS | 95% CI |", file=comment)
                  print("| --- | --- | ---: | ---: | ---: |", file=comment)
                  for name in ("base", "test"):
                      row = benchmark_report[name]
                      print(
                          f"| {name} | `{short_commit(row['resolved'])}` | {row['runs']} | {format_int(row['mean_nps'])} | ±{format_int(row['ci95_nps'])} |",
                          file=comment,
                      )
                  print(file=comment)
                  print(f"**Diff:** {format_signed_int(benchmark_report['diff_nps'])} ±{format_int(benchmark_report['diff_ci95_nps'])} nps  ", file=comment)
                  print(f"**Speedup:** {format_percent(benchmark_report['speedup_percent'])} ±{format_percent(benchmark_report['speedup_ci95_percent']).lstrip('+')}  ", file=comment)
                  print(f"**P(speedup > 0):** {format_probability(benchmark_report['probability_speedup'])}", file=comment)
              elif summary:
                  if field_values:
                      print("### Run Details", file=comment)
                      print("| Field | Value |", file=comment)
                      print("| --- | --- |", file=comment)
                      for field in fields:
                          if field in field_values:
                              print(f"| {field} | {table_escape(field_values[field])} |", file=comment)
                      print(file=comment)

                  print("### Result", file=comment)
                  print("```text", file=comment)
                  print("\n".join(summary), file=comment)
                  print("```", file=comment)
              elif lines:
                  print("### Raw Output Excerpt", file=comment)
                  print("```text", file=comment)
                  print("\n".join(lines[-160:]), file=comment)
                  print("```", file=comment)
              else:
                  print("benchmark-output.txt was not produced", file=comment)
          PY

          gh pr comment "$TARGET_PR" \
            --repo "$TARGET_REPO" \
            --body-file comment.md

      - name: Fail workflow if benchmark failed
        if: steps.bench.outputs.status != '0'
        run: exit 1
